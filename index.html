<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Flashcards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <main id="dashboard">
        <header class="app-header">
          <h1>📚 Memory Cards</h1>
          <div class="header-actions">
            <button id="share-app-btn" class="secondary-btn">Share App</button>
            <button id="share-cards-btn" class="secondary-btn">
              Share Cards
            </button>
            <button id="start-revise-btn" class="primary-btn" disabled>
              Start Revision
            </button>
          </div>
        </header>

        <section class="form-section">
          <form id="card-form">
            <input
              type="text"
              id="question-input"
              placeholder="Enter question..."
              required
              autocomplete="off"
            />
            <input
              type="text"
              id="answer-input"
              placeholder="Enter answer..."
              required
              autocomplete="off"
            />
            <button type="submit" id="submit-btn">Add Card</button>
          </form>
        </section>

        <section class="card-grid" id="card-grid"></section>
      </main>

      <main id="revise-view" class="hidden">
        <header class="revise-header">
          <span id="progress-indicator">Card 1 of 10</span>
          <button id="exit-btn" class="secondary-btn">Exit Revision</button>
        </header>

        <div class="flashcard-container" id="active-flashcard">
          <div class="flashcard-inner" id="flashcard-inner">
            <div class="flashcard-front">
              <h2 id="revise-question">Question goes here</h2>
              <span class="hint">Click or press Space to flip</span>
            </div>
            <div class="flashcard-back">
              <h2 id="revise-answer">Answer goes here</h2>
              <span class="hint">Click or press Space for next card</span>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
