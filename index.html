<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Flashcards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <div class="header-actions">
    <select id="folder-filter" class="secondary-btn">
      <option value="all">All Folders</option>
    </select>

    <button id="export-btn" class="secondary-btn">💾 Export</button>
    <button id="import-proxy-btn" class="secondary-btn">📂 Import</button>
    <input type="file" id="import-input" style="display: none" accept=".json" />
  </div>
  <body>
    <div id="app">
      <main id="dashboard">
        <header class="app-header">
          <h1>📚 Memory Cards</h1>
          <div class="header-actions">
            <button id="share-cards-btn" class="secondary-btn">
              Share Cards
            </button>
            <button id="start-revise-btn" class="primary-btn" disabled>
              Start Revision
            </button>
          </div>
        </header>

        <section class="form-section">
          <form id="card-form">
            <input
              type="text"
              id="question-input"
              placeholder="Question (Max 200)..."
              required
              maxlength="200"
            />
            <input
              type="url"
              id="image-input"
              placeholder="Image URL (Optional)"
            />
            <input
              type="text"
              id="answer-input"
              placeholder="Answer (Max 200)..."
              required
              maxlength="200"
            />
            <button type="submit" id="submit-btn">Add Card</button>
          </form>

          <div id="bulk-action-bar" class="hidden">
            <span id="selected-count">0 cards selected</span>
            <div class="bulk-buttons">
              <select id="move-to-folder-select">
                <option value="">Move to Folder...</option>
                <option value="new">+ Create New Folder</option>
              </select>
              <button id="bulk-delete-btn" class="delete-btn">
                Delete Selected
              </button>
              <button id="cancel-selection-btn">Cancel</button>
            </div>
          </div>
        </section>

        <section class="card-grid" id="card-grid"></section>
      </main>

      <main id="revise-view" class="hidden">
        <header class="revise-header">
          <span id="progress-indicator">Card 1 of 10</span>
          <button id="exit-btn" class="secondary-btn">Exit Revision</button>
        </header>

        <div class="flashcard-container" id="active-flashcard">
          <div class="flashcard-inner" id="flashcard-inner">
            <div class="flashcard-front">
              <h2 id="revise-question">Question goes here</h2>
              <img
                id="revise-image"
                src=""
                alt="Medical Diagram"
                style="
                  display: none;
                  max-width: 100%;
                  height: auto;
                  margin: 15px 0;
                  border-radius: 8px;
                "
              />
              <span class="hint">Click or press Space to flip</span>
            </div>
            <div class="flashcard-back">
              <h2 id="revise-answer">Answer goes here</h2>
              <span class="hint">Click or press Space for next card</span>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
